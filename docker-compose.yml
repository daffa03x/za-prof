services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      RUN_MIGRATIONS: "false"
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      - redis
      - mailpit

  redis:
    image: redis:7-alpine

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
